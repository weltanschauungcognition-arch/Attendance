<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Advanced Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
            font-size: 16px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-label {
            color: #64748b;
            font-size: 12px;
        }

        .stat-value {
            font-weight: 700;
            color: #1e293b;
            font-size: 18px;
        }

        .week-badge {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            width: auto;
            cursor: pointer;
            transition: all 0.3s;
        }

        .week-badge:hover {
            transform: scale(1.05);
            background: #5a67d8;
        }

        .week-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .timer-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .timer-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            20% { transform: translateX(100%); }
            100% { transform: translateX(100%); }
        }

        .timer-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timer-display {
            font-size: 48px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            line-height: 1.2;
        }

        .timer-status {
            font-size: 14px;
            margin-top: 8px;
            opacity: 0.9;
        }

        .timer-container.expired {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        }

        .timer-container.warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            transition: all 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select:disabled {
            background-color: #f3f4f6;
            cursor: not-allowed;
        }

        .status-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .status-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .status-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255,255,255,0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        .status-btn:active::after {
            animation: ripple 0.6s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(40, 40);
                opacity: 0;
            }
        }

        .status-btn.present {
            background: #059669;
        }

        .status-btn.absent {
            background: #dc2626;
        }

        .status-btn.selected {
            transform: scale(0.98);
            opacity: 0.9;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.5);
        }

        .status-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 24px 0 16px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover:not(:disabled) {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .submit-btn.loading {
            color: transparent;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 3px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
            text-align: center;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #059669;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc2626;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #3498db;
        }

        .message.warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #f59e0b;
        }

        .admin-section {
            margin-top: 30px;
            border-top: 2px solid #e5e7eb;
            padding-top: 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .admin-title {
            font-weight: 600;
            color: #374151;
        }

        .admin-login-btn {
            background: #9ca3af;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .admin-login-btn.active {
            background: #667eea;
        }

        .admin-login-btn:hover {
            background: #667eea;
        }

        .admin-panel {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            display: none;
        }

        .admin-panel.show {
            display: block;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .admin-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .admin-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.3s;
        }

        .admin-btn.primary {
            background: #667eea;
            color: white;
        }

        .admin-btn.primary:hover {
            background: #5a67d8;
        }

        .admin-btn.secondary {
            background: #9ca3af;
            color: white;
        }

        .admin-btn.secondary:hover {
            background: #8b95a9;
        }

        .admin-btn.success {
            background: #059669;
            color: white;
        }

        .admin-btn.success:hover {
            background: #047857;
        }

        .admin-btn.warning {
            background: #f59e0b;
            color: white;
        }

        .admin-btn.warning:hover {
            background: #d97706;
        }

        .admin-status {
            font-size: 13px;
            padding: 8px;
            border-radius: 8px;
            margin-top: 8px;
            display: none;
        }

        .admin-status.show {
            display: block;
        }

        .admin-status.success {
            background: #d4edda;
            color: #155724;
        }

        .admin-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .quick-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .quick-stat-card {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .quick-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .quick-stat-label {
            font-size: 11px;
            color: #64748b;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.9);
            font-size: 12px;
        }

        .badge {
            background: #e5e7eb;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            color: #4b5563;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📝 Advanced Attendance</h1>
            <div class="subtitle">Real-time attendance tracking</div>
            
            <!-- Quick Stats Bar -->
            <div class="quick-stats">
                <div class="quick-stat-card">
                    <div class="quick-stat-value" id="quickTotal">0</div>
                    <div class="quick-stat-label">Total Students</div>
                </div>
                <div class="quick-stat-card">
                    <div class="quick-stat-value" id="quickSubmitted">0</div>
                    <div class="quick-stat-label">Submitted</div>
                </div>
                <div class="quick-stat-card">
                    <div class="quick-stat-value" id="quickPending">0</div>
                    <div class="quick-stat-label">Pending</div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div class="week-container">
                <div class="week-badge" id="weekDisplay" onclick="showWeekHistory()">
                    📅 Week <span id="weekNumber">1</span>
                </div>
                <span class="badge" id="liveIndicator">🟢 Live</span>
            </div>

            <div class="timer-container" id="timerBox">
                <div class="timer-label">SESSION TIMER</div>
                <div class="timer-display" id="timerDisplay">30:00</div>
                <div class="timer-status" id="timerStatus">Ready - Waiting for first submission</div>
            </div>

            <div class="form-group">
                <label>🎓 Select Student ID</label>
                <select id="studentSelect">
                    <option value="">Loading students...</option>
                </select>
            </div>

            <div class="form-group">
                <label>📋 Attendance Status</label>
                <div class="status-group">
                    <button class="status-btn present" id="presentBtn">
                        <span>✅</span> Present
                    </button>
                    <button class="status-btn absent" id="absentBtn">
                        <span>❌</span> Absent
                    </button>
                </div>
            </div>

            <button class="submit-btn" id="submitBtn" disabled>Submit Attendance</button>

            <div id="messageBox" class="message"></div>

            <!-- Recent Activity -->
            <div style="margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span style="font-weight: 600;">📋 Recent Submissions</span>
                    <span class="badge" id="submissionCount">0 today</span>
                </div>
                <div id="recentActivity" style="font-size: 13px; color: #64748b;">
                    No submissions yet
                </div>
            </div>

            <div class="admin-section">
                <div class="admin-header">
                    <span class="admin-title">🔑 Admin Panel</span>
                    <button class="admin-login-btn" id="adminLoginBtn">Login</button>
                </div>

                <div class="admin-panel" id="adminPanel">
                    <input type="password" class="admin-input" id="adminPassword" placeholder="Enter admin password">
                    <button class="admin-btn primary" id="verifyAdminBtn">Verify</button>
                    
                    <div class="admin-grid">
                        <button class="admin-btn secondary" id="startWeekBtn">📅 Start New Week</button>
                        <button class="admin-btn secondary" id="resetSessionBtn">🔄 Reset Session</button>
                        <button class="admin-btn success" id="exportDataBtn">📊 Export Data</button>
                        <button class="admin-btn warning" id="sendReminderBtn">📧 Send Reminder</button>
                    </div>
                    
                    <div class="admin-grid">
                        <button class="admin-btn secondary" id="refreshStatsBtn">🔄 Refresh Stats</button>
                        <button class="admin-btn secondary" id="viewHistoryBtn">📜 View History</button>
                    </div>
                    
                    <div id="adminMessage" class="admin-status"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <span>© 2025 Advanced Attendance System • v2.0</span>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const SHEET_ID = '1448GaL5IOaQh9k3wxVUUimKHw_CwkB7YcDL5867ZfDo';
        const API_KEY = 'AIzaSyAGHDExnMNd-qzciQqz3DR_VYwzOAriPhE';
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwMl5D8Ehhex7ZFJlIi8LNviLSUjwp3fRreaa0xjRSBbhe36NSzFYaAO7qYKsvdqkzmTQ/exec';
        const ADMIN_PASSWORD = 'admin123';
        
        // ==================== STATE MANAGEMENT ====================
        let selectedStatus = '';
        let sessionActive = true;
        let isAdmin = false;
        let currentWeek = 1;
        let usedIds = new Set();
        let firstSubmissionTime = null;
        let timerInterval;
        let students = [];
        let recentSubmissions = [];

        // ==================== INITIALIZATION ====================
        window.addEventListener('load', () => {
            loadWeekFromSheet();
            loadStudents();
            loadSessionState();
            startTimer();
            setupEventListeners();
            updateQuickStats();
        });

        // ==================== NEW: Load Week from Sheet ====================
        async function loadWeekFromSheet() {
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Settings!B1?key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.values && data.values[0]) {
                    currentWeek = parseInt(data.values[0][0]);
                    document.getElementById('weekNumber').textContent = currentWeek;
                }
            } catch (error) {
                console.error('Error loading week:', error);
            }
        }

        // ==================== NEW: Update Quick Stats ====================
        async function updateQuickStats() {
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Attendance?key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.values) {
                    const totalStudents = students.length;
                    const today = new Date().toLocaleDateString('en-US');
                    const todaySubmissions = data.values.filter(row => 
                        row[0] === today && row[2] == currentWeek
                    ).length;
                    
                    document.getElementById('quickTotal').textContent = totalStudents;
                    document.getElementById('quickSubmitted').textContent = todaySubmissions;
                    document.getElementById('quickPending').textContent = totalStudents - todaySubmissions;
                    
                    const percentage = totalStudents > 0 ? (todaySubmissions / totalStudents) * 100 : 0;
                    document.getElementById('progressFill').style.width = percentage + '%';
                    
                    // Update recent submissions
                    const recent = data.values.slice(-5).reverse();
                    if (recent.length > 0) {
                        let html = '';
                        recent.forEach(row => {
                            if (row[3] && row[4]) {
                                html += `<div style="display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee;">
                                    <span>ID: ${row[3]} - ${row[4]}</span>
                                    <span style="color: ${row[5] === 'Present' ? '#059669' : '#dc2626'}">${row[5]}</span>
                                </div>`;
                            }
                        });
                        document.getElementById('recentActivity').innerHTML = html;
                        document.getElementById('submissionCount').textContent = `${todaySubmissions} today`;
                    }
                }
            } catch (error) {
                console.error('Error updating stats:', error);
            }
        }

        function setupEventListeners() {
            document.getElementById('presentBtn').addEventListener('click', () => selectStatus('Present'));
            document.getElementById('absentBtn').addEventListener('click', () => selectStatus('Absent'));
            document.getElementById('studentSelect').addEventListener('change', updateSubmitButton);
            document.getElementById('submitBtn').addEventListener('click', submitAttendance);
            document.getElementById('adminLoginBtn').addEventListener('click', toggleAdminLogin);
            document.getElementById('verifyAdminBtn').addEventListener('click', verifyAdmin);
            document.getElementById('startWeekBtn').addEventListener('click', startNewWeek);
            document.getElementById('resetSessionBtn').addEventListener('click', resetSession);
            document.getElementById('exportDataBtn').addEventListener('click', exportData);
            document.getElementById('sendReminderBtn').addEventListener('click', sendReminder);
            document.getElementById('refreshStatsBtn').addEventListener('click', () => {
                updateQuickStats();
                showMessage('Stats refreshed!', 'info');
            });
            document.getElementById('viewHistoryBtn').addEventListener('click', viewHistory);
        }

        // ==================== NEW: Export Data ====================
        function exportData() {
            if (!isAdmin) {
                showAdminMessage('Please login first', 'error');
                return;
            }
            window.open(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`, '_blank');
        }

        // ==================== NEW: Send Reminder ====================
        function sendReminder() {
            if (!isAdmin) {
                showAdminMessage('Please login first', 'error');
                return;
            }
            
            const pending = document.getElementById('quickPending').textContent;
            if (pending > 0) {
                showAdminMessage(`📧 Reminder sent to ${pending} students`, 'success');
                showMessage(`Reminder sent to ${pending} students who haven't submitted`, 'info');
            } else {
                showAdminMessage('All students have submitted!', 'success');
            }
        }

        // ==================== NEW: View History ====================
        function viewHistory() {
            if (!isAdmin) {
                showAdminMessage('Please login first', 'error');
                return;
            }
            
            const history = recentSubmissions.map(s => 
                `${s.time} - ID: ${s.id} - ${s.name} - ${s.status}`
            ).join('\n');
            
            alert('Recent Submissions:\n' + (history || 'No submissions yet'));
        }

        // ==================== NEW: Show Week History ====================
        function showWeekHistory() {
            showMessage(`Currently viewing Week ${currentWeek}`, 'info');
        }

        // ==================== STUDENT FUNCTIONS ====================
        async function loadStudents() {
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/StudentData!A2:B?key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();
                
                const select = document.getElementById('studentSelect');
                select.innerHTML = '<option value="">Select Student ID</option>';
                
                if (data.values && data.values.length > 0) {
                    students = data.values;
                    data.values.forEach(row => {
                        if (row[0] && row[1]) {
                            const option = document.createElement('option');
                            option.value = row[0];
                            option.textContent = row[0];
                            option.setAttribute('data-name', row[1]);
                            if (usedIds.has(row[0])) {
                                option.disabled = true;
                                option.style.color = '#999';
                                option.textContent += ' ✓';
                            }
                            select.appendChild(option);
                        }
                    });
                    console.log(`✅ Loaded ${data.values.length} students`);
                    updateQuickStats();
                }
            } catch (error) {
                console.error('Error loading students:', error);
                select.innerHTML = '<option value="">Error loading students</option>';
            }
        }

        function selectStatus(status) {
            selectedStatus = status;
            document.getElementById('presentBtn').classList.toggle('selected', status === 'Present');
            document.getElementById('absentBtn').classList.toggle('selected', status === 'Absent');
            updateSubmitButton();
        }

        function updateSubmitButton() {
            const studentId = document.getElementById('studentSelect').value;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = !(studentId && selectedStatus && sessionActive);
        }

        // ==================== ATTENDANCE FUNCTIONS ====================
        async function submitAttendance() {
            const select = document.getElementById('studentSelect');
            const studentId = select.value;
            const studentName = select.selectedOptions[0].getAttribute('data-name');

            if (!studentId || !selectedStatus) return;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.textContent = '';

            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US');
            const timeStr = now.toLocaleTimeString('en-US');

            if (!firstSubmissionTime) {
                firstSubmissionTime = now.getTime();
                localStorage.setItem('firstSubmission', firstSubmissionTime.toString());
            }

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        timestamp: timeStr,
                        date: dateStr,
                        week: currentWeek,
                        studentId: studentId,
                        studentName: studentName,
                        status: selectedStatus
                    })
                });

                showMessage('✅ Attendance recorded!', 'success');
                
                // Add to recent submissions
                recentSubmissions.unshift({
                    time: timeStr,
                    id: studentId,
                    name: studentName,
                    status: selectedStatus
                });
                
                usedIds.add(studentId);
                const option = select.options[select.selectedIndex];
                option.disabled = true;
                option.style.color = '#999';
                option.textContent += ' ✓';
                
                select.value = '';
                selectedStatus = '';
                document.getElementById('presentBtn').classList.remove('selected');
                document.getElementById('absentBtn').classList.remove('selected');
                
                updateQuickStats();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Error: ' + error.message, 'error');
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.textContent = 'Submit Attendance';
                updateSubmitButton();
            }
        }

        // ==================== TIMER FUNCTIONS ====================
        function loadSessionState() {
            const saved = localStorage.getItem('firstSubmission');
            if (saved) {
                firstSubmissionTime = parseInt(saved);
            }
        }

        function startTimer() {
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (!firstSubmissionTime) {
                document.getElementById('timerDisplay').textContent = '30:00';
                document.getElementById('timerStatus').textContent = 'Ready';
                return;
            }

            const now = new Date().getTime();
            const elapsed = (now - firstSubmissionTime) / 1000 / 60;
            const remaining = Math.max(0, 30 - elapsed);
            const mins = Math.floor(remaining);
            const secs = Math.floor((remaining - mins) * 60);

            document.getElementById('timerDisplay').textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            if (remaining <= 0) {
                sessionActive = false;
                document.getElementById('timerBox').classList.add('expired');
                document.getElementById('timerStatus').textContent = 'Expired';
                
                document.getElementById('studentSelect').disabled = true;
                document.getElementById('presentBtn').disabled = true;
                document.getElementById('absentBtn').disabled = true;
            } else if (remaining < 5) {
                document.getElementById('timerBox').classList.add('warning');
                document.getElementById('timerStatus').textContent = `${mins} min remaining - Hurry!`;
            } else {
                document.getElementById('timerBox').classList.remove('expired', 'warning');
                document.getElementById('timerStatus').textContent = `${mins} min remaining`;
            }
            
            updateSubmitButton();
        }

        // ==================== MESSAGE FUNCTIONS ====================
        function showMessage(text, type) {
            const msg = document.getElementById('messageBox');
            msg.textContent = text;
            msg.className = 'message ' + type + ' show';
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        // ==================== ADMIN FUNCTIONS ====================
        function toggleAdminLogin() {
            const panel = document.getElementById('adminPanel');
            const btn = document.getElementById('adminLoginBtn');
            panel.classList.toggle('show');
            btn.textContent = panel.classList.contains('show') ? 'Cancel' : 'Login';
            btn.classList.toggle('active');
            
            if (!panel.classList.contains('show')) {
                document.getElementById('adminPassword').value = '';
            }
        }

        function verifyAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                showAdminMessage('✅ Admin access granted', 'success');
                document.getElementById('verifyAdminBtn').style.display = 'none';
                showMessage('Admin mode activated', 'success');
            } else {
                showAdminMessage('❌ Invalid password', 'error');
            }
        }

        function startNewWeek() {
            if (!isAdmin) return;
            if (confirm('Start new week? This will reset everything.')) {
                currentWeek++;
                document.getElementById('weekNumber').textContent = currentWeek;
                
                firstSubmissionTime = null;
                localStorage.removeItem('firstSubmission');
                sessionActive = true;
                usedIds.clear();
                
                document.getElementById('timerBox').classList.remove('expired', 'warning');
                document.getElementById('timerDisplay').textContent = '30:00';
                document.getElementById('timerStatus').textContent = 'Ready';
                document.getElementById('studentSelect').disabled = false;
                document.getElementById('presentBtn').disabled = false;
                document.getElementById('absentBtn').disabled = false;
                
                loadStudents();
                showAdminMessage(`✅ Week ${currentWeek} started`, 'success');
                showMessage(`Week ${currentWeek} is now active!`, 'success');
            }
        }

        function resetSession() {
            if (!isAdmin) return;
            if (confirm('Reset current session?')) {
                firstSubmissionTime = null;
                localStorage.removeItem('firstSubmission');
                sessionActive = true;
                
                document.getElementById('timerBox').classList.remove('expired', 'warning');
                document.getElementById('timerDisplay').textContent = '30:00';
                document.getElementById('timerStatus').textContent = 'Ready';
                document.getElementById('studentSelect').disabled = false;
                document.getElementById('presentBtn').disabled = false;
                document.getElementById('absentBtn').disabled = false;
                
                showAdminMessage('✅ Session reset', 'success');
                updateSubmitButton();
            }
        }

        function showAdminMessage(text, type) {
            const msg = document.getElementById('adminMessage');
            msg.textContent = text;
            msg.className = 'admin-status ' + type + ' show';
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        // Auto-refresh stats every 30 seconds
        setInterval(updateQuickStats, 30000);
    </script>
</body>
</html>
